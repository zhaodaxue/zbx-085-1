version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3002:3001"
    volumes:
      - ./backend/data:/app/data
    environment:
      - PORT=3001
      - DB_PATH=/app/data/planter.db

  frontend:
    build: ./frontend
    ports:
      - "5180:5174"
    depends_on:
      - backend
    environment:
      - VITE_API_TARGET=http://backend:3001
